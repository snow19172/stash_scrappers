name: Fansly (API)
sceneByURL:
  - action: scrapeJson
    url:
      - fansly.com/post/
# You can add '&sessionToken={InsertTokenHere}' to the end of the queryURL to scrape paywalled content. 
# Grab the token from Fansly: F12 -> Network -> any apiv3.fansly.com request -> look for sessionToken query param
    queryURL: https://apiv3.fansly.com/api/v1/post?ids={url}&ngsw-bypass=true
    queryURLReplace:
      url:
        - regex: '.+\/post\/(\d+)'
          with: "$1"
    scraper: apiScraper
performerByName:
  action: scrapeJson
  queryURL: https://apiv3.fansly.com/api/v1/account?usernames={}&ngsw-bypass=true
  scraper: performerSearch
performerByURL:
  - action: scrapeJson
    url:
      - https://fansly.com
    scraper: performerScraper
    queryURL: "{url}"
    queryURLReplace:
      url:
        - regex: ^https:\/\/fansly\.com\/([^\/?#]+)(?:\/posts)?\/?$
          with: https://apiv3.fansly.com/api/v1/account?usernames=$1&ngsw-bypass=true
jsonScrapers:
  apiScraper:
    scene:
      Title:
       selector: response.posts.0.content
       postProcess:
         - replace:
           - regex: "\\n+.+"
             with: ""
      Code: response.posts.0.id
      Details: response.posts.0.content
      Image: response.accountMedia.0.media.variants.0.locations.0.location
      Date:
        selector: response.posts.0.createdAt
        postProcess:
          - parseDate: unix
      Studio:
        Name: 
          selector: response.accounts.0.username
          postProcess:
            - replace:
              - regex: "$"
                with: " (Fansly)"
      Performers:
        Name: response.accounts.0.username
      Tags:
        Name: 
          selector: response.posts.0.content
          postProcess:
            - replace:
              - regex: "(?s).*?(#.*)|.*"
                with: "$1"
              - regex: "#"
                with: ""
          split: " "

  performerSearch:
    performer:
      Name: response.0.username
      Aliases: response.0.displayName
      Gender:
        fixed: female
      URLs:
        selector: response.0.username
        postProcess:
          - replace:
              - regex: (.*)$
                with: https://fansly.com/$1/posts
      Country: response.0.location
      Image: 
        selector: response.0.avatar.locations.0.location
      Details: 
        selector: response.0.about
  performerScraper:
    performer:
      Name: response.0.username
      Aliases: response.0.displayName
      Gender:
        fixed: female
      URLs:
        selector: response.0.username
        postProcess:
          - replace:
              - regex: (.*)$
                with: https://fansly.com/$1/posts
      Country: response.0.location
      Image: 
        selector: response.0.avatar.locations.0.location
      Details: 
        selector: response.0.about

